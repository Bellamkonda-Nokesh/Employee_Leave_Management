<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — LeaveFlow Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script>
      (function(){
        var t = localStorage.getItem('lf-theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div style="position:fixed;top:1rem;right:1rem;z-index:9999;min-width:300px;">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible" role="alert" style="margin-bottom:0.5rem;">
            <i class="bi bi-info-circle"></i> {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
{% endwith %}

<div class="auth-wrapper" style="align-items:flex-start;padding-top:3rem;">
    <!-- Animated background -->
    <div style="position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
        <div style="position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,0.12) 0%,transparent 70%);top:-100px;right:-100px;animation:float1 9s ease-in-out infinite;"></div>
        <div style="position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(52,211,153,0.08) 0%,transparent 70%);bottom:-50px;left:-80px;animation:float2 11s ease-in-out infinite;"></div>
    </div>

    <div class="auth-card" style="max-width:560px;position:relative;z-index:1;">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join LeaveFlow Pro as a new employee</p>
        </div>

        <form method="POST" id="registerForm" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

            <!-- Name Row -->
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="first_name" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="first_name" name="first_name"
                           placeholder="Jane" required autocomplete="given-name">
                </div>
                <div class="col-md-6">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="last_name" name="last_name"
                           placeholder="Doe" required autocomplete="family-name">
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="jane@company.com" required autocomplete="email">
                </div>
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-at"></i></span>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="janedoe" required autocomplete="username">
                </div>
            </div>

            <!-- Department -->
            <div class="mb-3">
                <label for="department" class="form-label">Department</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-building"></i></span>
                    <select class="form-select" id="department" name="department" required>
                        <option value="">Select Department</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Human Resources">Human Resources</option>
                        <option value="Finance">Finance</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Operations">Operations</option>
                        <option value="Sales">Sales</option>
                    </select>
                </div>
            </div>

            <!-- Manager -->
            <div class="mb-3">
                <label for="manager_id" class="form-label">Reporting Manager <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-diagram-3"></i></span>
                    <select class="form-select" id="manager_id" name="manager_id">
                        <option value="">No Manager</option>
                        {% for m in managers %}
                        <option value="{{ m.id }}">{{ m.full_name }} — {{ m.department }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Passwords -->
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
                    <div id="pwdStrength" style="height:4px;border-radius:2px;margin-top:6px;background:var(--border);overflow:hidden;">
                        <div id="pwdStrengthBar" style="height:100%;width:0%;border-radius:2px;transition:all 0.3s;"></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                           placeholder="Repeat password" required autocomplete="new-password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-4" id="registerBtn" style="padding:.75rem;">
                <i class="bi bi-person-check"></i>
                <span>Create Account</span>
            </button>
        </form>

        <div class="text-center" style="font-size:0.875rem;color:var(--text-muted);">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" style="color:var(--accent);font-weight:600;">
                Sign in <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>
</div>

<style>
@keyframes float1 {
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(-40px,30px);}
}
@keyframes float2 {
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(40px,-25px);}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Password strength
document.getElementById('password').addEventListener('input', function() {
    const val = this.value;
    const bar = document.getElementById('pwdStrengthBar');
    let strength = 0;
    if (val.length >= 6) strength++;
    if (val.length >= 10) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;
    const colors = ['','#F87171','#FBBF24','#FBBF24','#34D399','#34D399'];
    const widths = [0, 20, 40, 60, 80, 100];
    bar.style.width = widths[strength] + '%';
    bar.style.background = colors[strength];
});

// Confirm password match
document.getElementById('confirm_password').addEventListener('input', function() {
    const pwd = document.getElementById('password').value;
    if (this.value && this.value !== pwd) {
        this.style.borderColor = 'rgba(248,113,113,0.6)';
    } else {
        this.style.borderColor = '';
    }
});
</script>
</body>
</html>
