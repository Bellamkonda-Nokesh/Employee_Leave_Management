{% extends "base.html" %}
{% block title %}Add New User — Admin — LeaveFlow Pro{% endblock %}
{% block content %}

<div class="page-header">
    <div>
        <h1 class="page-title"><i class="bi bi-person-plus-fill"></i> Add New User</h1>
        <p class="page-subtitle">Create a new user account in the system</p>
    </div>
    <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline" id="add-user-back">
        <i class="bi bi-arrow-left"></i> Back to Users
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass-card">
            <div class="glass-card-header">
                <div class="glass-card-title"><i class="bi bi-person-plus"></i> User Details</div>
            </div>
            <div class="glass-card-body">
                <form method="POST" id="addUserForm" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                    <!-- Name Row -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="first_name" name="first_name"
                                   placeholder="Jane" required>
                        </div>
                        <div class="col-md-6">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="last_name" name="last_name"
                                   placeholder="Doe" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="jane@company.com" required>
                        </div>
                    </div>

                    <!-- Username -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-at"></i></span>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="janedoe" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Min. 6 characters" required minlength="6">
                        </div>
                    </div>

                    <!-- Dept & Role Row -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="department" class="form-label">Department</label>
                            <select class="form-select" id="department" name="department" required>
                                <option value="">Select Department</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Human Resources">Human Resources</option>
                                <option value="Finance">Finance</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Operations">Operations</option>
                                <option value="Sales">Sales</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="role" class="form-label">Role</label>
                            <select class="form-select" id="role" name="role" required>
                                <option value="employee">Employee</option>
                                <option value="manager">Manager</option>
                                <option value="admin">HR Admin</option>
                            </select>
                        </div>
                    </div>

                    <!-- Manager -->
                    <div class="mb-5">
                        <label for="manager_id" class="form-label">Reporting Manager <span style="font-weight:400;color:var(--text-muted);">(optional)</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-diagram-3"></i></span>
                            <select class="form-select" id="manager_id" name="manager_id">
                                <option value="">No Manager</option>
                                {% for m in managers %}
                                <option value="{{ m.id }}">{{ m.full_name }} — {{ m.department }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
                        <button type="submit" class="btn btn-primary" id="create-user-btn" style="flex:1;min-width:160px;padding:.7rem;">
                            <i class="bi bi-person-plus"></i> Create User
                        </button>
                        <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline" style="flex:1;min-width:120px;padding:.7rem;text-align:center;">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
